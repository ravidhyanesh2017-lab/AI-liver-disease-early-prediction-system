<!DOCTYPE html>
<html>
<head>
<title>Liver Disease Prediction</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg,#43cea2,#185a9d);
    padding-top: 60px;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
    color:#1f4e79;
}

.container{
background:white;
padding:50px;
border-radius:30px;
width:480px;
margin:20px auto;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

button{
background: linear-gradient(135deg,#2b7cff,#1e4ed8);
color:white;
border:none;
padding:12px 25px;
border-radius:10px;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(0,0,0,0.25);
}

</style>
</head>

<body>

<div class="container">

<h1>🧬 Liver Disease Prediction System</h1>

<p>
This system predicts the risk of liver disease using 
Machine Learning based on medical parameters.
</p>

<form action="/predict" method="post">

Age <br>
<input type="number" name="age" required><br><br>

Total Bilirubin <br>
<input type="number" step="0.1" name="tb" required><br><br>

Direct Bilirubin <br>
<input type="number" step="0.1" name="db" required><br><br>

ALP <br>
<input type="number" name="alp" required><br><br>

SGPT <br>
<input type="number" name="sgpt" required><br><br>

SGOT <br>
<input type="number" name="sgot" required><br><br>

Total Protein <br>
<input type="number" step="0.1" name="tp" required><br><br>

Albumin <br>
<input type="number" step="0.1" name="alb" required><br><br>

<button type="submit">Predict Liver Risk</button>

</form>

</div>

</body>
</html>
